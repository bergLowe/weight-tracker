name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from repository secrets
        run: |
          sed \
            -e "s|REPLACE_WITH_YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com|${OAUTH_CLIENT_ID}|" \
            -e "s|REPLACE_WITH_YOUR_APPS_SCRIPT_WEB_APP_URL|${WEB_APP_URL}|" \
            frontend/config.example.js > frontend/config.js
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
